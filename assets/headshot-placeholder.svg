<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000" role="img" aria-label="Headshot placeholder">
  <defs>
    <pattern id="stripes" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="14" height="14" fill="#EFEBE2"></rect>
      <rect width="7" height="14" fill="#E7E2D7"></rect>
    </pattern>
  </defs>
  <rect width="800" height="1000" fill="url(#stripes)"></rect>
  <rect x="0.5" y="0.5" width="799" height="999" fill="none" stroke="#D8D2C5" stroke-width="1"></rect>
  <g fill="#615b4d" font-family="ui-monospace, &#39;SF Mono&#39;, Menlo, Consolas, monospace" text-anchor="middle">
    <text x="400" y="492" font-size="26" letter-spacing="2">HEADSHOT</text>
    <text x="400" y="528" font-size="16" letter-spacing="1" fill="#615b4d">replace with your photo — portrait, 4:5</text>
  </g>
</svg>